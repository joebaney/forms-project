<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Sign-up Form</title>
  </head>
  <body>
    <div class="container">
      <div class="image-section">
        <div class="black-box">
            <img src="images/odin-lined.png" alt="The logo for The Odin Project">
            <span>ODIN</span>
        </div>
      </div>

      <div class="form-section">
        <h2>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up <em>now</em> to get started.</em></h2>

        <h2>You <em>know</em> you want to.</h2>

        <div class="input-container">
            <h2>Let's do this!</h2>
            <form>
                <div class="form-group">
                    <label for="first-name">First Name</label>
                    <input type="text" id="first-name" placeholder="First Name" required>
                </div>

                <div class="form-group">
                    <label for="last-name">Last Name</label>
                    <input type="text" id="last-name" placeholder="Last name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="text" id="phone" placeholder="(111) 222-3333" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required minlength="6" maxlength="12" placeholder="*****">
                </div>
                <div class="form-group">
                    <label for="verify-password">Confirm Password</label>
                    <input type="password" id="verify-password" required minlength="6" maxlength="12" placeholder="*****">
                </div>

        </div>
                <button type="submit">Create Account</button>
            </form>
            <p>Already have an account? <a>Log In</a></p>
      </div>
    </div>
  </body>
</html>
